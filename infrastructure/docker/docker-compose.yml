services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: revnara
    ports:
      - "5432:5432"
    volumes:
      - revnara_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    env_file:
      - ../../backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  revnara_postgres_data:
