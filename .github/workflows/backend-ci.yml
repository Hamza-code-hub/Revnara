name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "supabase/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "supabase/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy app

      - name: Model gateway is the only path that calls a model provider (BE8 DoD)
        run: |
          # app/files/storage.py and app/rag/embeddings.py have their own
          # pre-Sprint-8 httpx use (Supabase Storage, the embeddings API --
          # neither is a chat/completion model-provider call) -- excluded
          # deliberately, not because this check is loose.
          if grep -rn "^import httpx\|^from httpx" app --include="*.py" \
              | grep -v "^app/model_gateway/providers/\|^app/files/storage.py\|^app/rag/embeddings.py"; then
            echo "A module outside app/model_gateway/providers/ imports httpx directly -- model calls must go through app/model_gateway/gateway.py."
            exit 1
          fi

      - name: Run tests
        run: pytest --tb=short

  migration-check:
    runs-on: ubuntu-latest
    services:
      # Sprint 5's migration needs the `vector` and `pgmq` extensions,
      # neither bundled with a vanilla postgres image (confirmed
      # empirically -- see docs/rag-pattern.md) -- switched to Supabase's
      # own reference Postgres image (what a real Supabase project
      # actually runs, also what `supabase start` uses locally) rather
      # than a plain postgres:16 image plus a guessed-at extension
      # installation step. Not yet verified by an actual CI run in this
      # environment -- watch the first real run of this job closely.
      postgres:
        image: supabase/postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: revnara
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/revnara
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply all migrations against a clean database
        run: alembic upgrade head

      - name: Confirm no un-generated model changes are pending
        run: alembic check

      - name: Validate dev seed script against the real schema (DQ2.1)
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d revnara -f ../supabase/seeds/dev_seed.sql

  # DQ3.1: the RLS/tenant-isolation suite (backend/tests/rls/) against a
  # real Postgres, required on every PR -- this is the one test category
  # in this repo that cannot be verified against SQLite at all (see
  # docs/rls-pattern.md). Deliberately a *separate* job from
  # migration-check: connects as a dedicated non-superuser role, since a
  # superuser bypasses RLS (and FORCE ROW LEVEL SECURITY) entirely and
  # would make these tests pass for the wrong reason -- discovered by
  # actually running this locally, not assumed from documentation.
  rls-tests:
    runs-on: ubuntu-latest
    services:
      # See migration-check's identical comment -- Sprint 5's migration
      # needs vector/pgmq, not available on a vanilla postgres image.
      postgres:
        image: supabase/postgres:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGPASSWORD: postgres
      APP_DATABASE_URL: postgresql+asyncpg://revnara_app@localhost:5432/revnara_rls_test
      RLS_TEST_DATABASE_URL: postgresql+asyncpg://revnara_app@localhost:5432/revnara_rls_test
      RAG_TEST_DATABASE_URL: postgresql+asyncpg://revnara_app@localhost:5432/revnara_rls_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Create the non-superuser app role and its database
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE ROLE revnara_app LOGIN;"
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE revnara_rls_test OWNER revnara_app;"

      - name: Apply migrations as the app role (never as postgres/superuser)
        env:
          DATABASE_URL: ${{ env.APP_DATABASE_URL }}
        run: alembic upgrade head

      - name: Apply every RLS policy file as the app role
        run: |
          for f in 00_functions organizations users workspaces roles permissions role_permissions organization_members audit_events skills team_members team_member_skills portfolio_items case_studies files knowledge_chunks clients contacts opportunity_sources opportunities qualification_results team_match_results explainability_records override_records agent_runs tool_actions; do
            psql -h localhost -U revnara_app -d revnara_rls_test -v ON_ERROR_STOP=1 -f "../supabase/rls/${f}.sql"
          done

      # Provisions the document_tasks/embedding_tasks queues as the
      # superuser postgres role -- safe regardless of which role ends up
      # owning the vector/pgmq extensions in this fresh database (see
      # docs/rag-pattern.md's ownership-order explanation), unlike the
      # real Supabase project where only the admin role can do this.
      - name: Provision RAG queues as the superuser role
        run: |
          psql -h localhost -U postgres -d revnara_rls_test -v ON_ERROR_STOP=1 -f "../supabase/config/rag_queues.sql"

      - name: Provision the agent_tasks queue as the superuser role
        run: |
          psql -h localhost -U postgres -d revnara_rls_test -v ON_ERROR_STOP=1 -f "../supabase/config/agent_queues.sql"

      - name: Confirm every tenant-scoped table actually has RLS enabled
        run: |
          psql -h localhost -U postgres -d revnara_rls_test -v ON_ERROR_STOP=1 -f - <<'EOF'
          DO $$
          DECLARE missing text;
          BEGIN
            SELECT string_agg(tablename, ', ') INTO missing
            FROM pg_tables
            WHERE schemaname = 'public'
              AND tablename NOT IN ('alembic_version')
              AND tablename NOT IN (
                SELECT tablename FROM pg_tables t
                JOIN pg_class c ON c.relname = t.tablename
                WHERE c.relrowsecurity = true
              );
            IF missing IS NOT NULL THEN
              RAISE EXCEPTION 'Table(s) missing RLS entirely: %', missing;
            END IF;
          END $$;
          EOF

      - name: Run the real RLS test suite
        run: pytest tests/rls -v

      - name: Run the real RAG test suite (pgvector + pgmq)
        run: pytest tests/rag -v

      - name: Run the real agent runtime test suite (pgmq worker reliability)
        run: pytest tests/agents -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: revnara-backend:ci
